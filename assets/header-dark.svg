<svg width="940" height="250" viewBox="0 0 940 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font: 700 54px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #e6edf3; letter-spacing: -1.5px; }
    .tag  { font: 400 21px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #9198a1; }
    .word { font: 600 23px 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace; fill: #818cf8; opacity: 0; animation: cycle 12s infinite; }
    .w2 { animation-delay: 3s; }
    .w3 { animation-delay: 6s; }
    .w4 { animation-delay: 9s; }
    @keyframes cycle {
      0%   { opacity: 0; transform: translateY(8px); }
      4%   { opacity: 1; transform: translateY(0); }
      22%  { opacity: 1; transform: translateY(0); }
      26%  { opacity: 0; transform: translateY(-8px); }
      100% { opacity: 0; transform: translateY(-8px); }
    }
    .fadein { opacity: 0; animation: fadein 0.9s ease-out forwards; }
    .d1 { animation-delay: 0.2s; }
    .bar { transform: scaleX(0); transform-origin: 470px 0; animation: grow 1.1s 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes grow { to { transform: scaleX(1); } }
    .blob  { animation: drift 16s ease-in-out infinite alternate; }
    .blob2 { animation: drift2 14s ease-in-out infinite alternate; }
    @keyframes drift  { to { transform: translate(40px, 14px); } }
    @keyframes drift2 { to { transform: translate(-36px, -12px); } }
  </style>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>
  <circle class="blob"  cx="150" cy="55"  r="95" fill="#6366f1" opacity="0.16" filter="url(#blur)"/>
  <circle class="blob2" cx="790" cy="185" r="95" fill="#f97316" opacity="0.10" filter="url(#blur)"/>
  <text x="470" y="94" text-anchor="middle" class="name fadein">Ryan Luttrell</text>
  <rect class="bar" x="400" y="114" width="140" height="4" rx="2" fill="url(#g)"/>
  <text x="470" y="156" text-anchor="middle" class="tag fadein d1">I build software for the industries spreadsheets forgot.</text>
  <text x="470" y="206" text-anchor="middle" class="word">☕ coffee roasteries</text>
  <text x="470" y="206" text-anchor="middle" class="word w2">⛪ brand-new churches</text>
  <text x="470" y="206" text-anchor="middle" class="word w3">🏔️ roadside motels</text>
  <text x="470" y="206" text-anchor="middle" class="word w4">🚀 founders with napkin sketches</text>
</svg>
