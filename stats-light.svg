  <g class="row" style="animation-delay:0.36s">
    <text x="24" y="160" style="font:400 14px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#57606a">Issues</text>
    <text x="436" y="160" text-anchor="end" style="font:600 14px 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace" fill="#1f2328">3</text>
  </g>
  <g class="row" style="animation-delay:0.48s">
    <text x="24" y="184" style="font:400 14px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#57606a">Public repos</text>
    <text x="436" y="184" text-anchor="end" style="font:600 14px 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace" fill="#1f2328">82</text>
