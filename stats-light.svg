<svg width="460" height="210" viewBox="0 0 460 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .row { opacity: 0; animation: fadein 0.6s ease-out forwards; }
    @keyframes fadein { to { opacity: 1; } }
  </style>
  <rect x="0.5" y="0.5" width="459" height="209" rx="10" stroke="#d0d7de"/>
  <text x="24" y="42" style="font:600 18px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#4f46e5">GitHub stats</text>
  <g class="row" style="animation-delay:0.00s">
    <text x="24" y="88" style="font:400 14px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#57606a">Stars earned</text>
    <text x="436" y="88" text-anchor="end" style="font:600 14px 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace" fill="#1f2328">1</text>
  </g>
  <g class="row" style="animation-delay:0.12s">
    <text x="24" y="112" style="font:400 14px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#57606a">Contributions (past year)</text>
    <text x="436" y="112" text-anchor="end" style="font:600 14px 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace" fill="#1f2328">6,526</text>
  </g>
  <g class="row" style="animation-delay:0.24s">
    <text x="24" y="136" style="font:400 14px -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#57606a">Pull requests</text>
